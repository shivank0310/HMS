---
Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: ../organizations/ordererOrganizations/example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
    OrdererEndpoints:
      - orderer.example.com:7050

  - &HospitalAdmin
    Name: HospitalAdminMSP
    ID: HospitalAdminMSP
    MSPDir: ../organizations/peerOrganizations/hospitaladmin.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('HospitalAdminMSP.admin', 'HospitalAdminMSP.peer', 'HospitalAdminMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('HospitalAdminMSP.admin', 'HospitalAdminMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('HospitalAdminMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('HospitalAdminMSP.peer')"

  - &ClinicalStaff
    Name: ClinicalStaffMSP
    ID: ClinicalStaffMSP
    MSPDir: ../organizations/peerOrganizations/clinicalstaff.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('ClinicalStaffMSP.admin', 'ClinicalStaffMSP.peer', 'ClinicalStaffMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('ClinicalStaffMSP.admin', 'ClinicalStaffMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('ClinicalStaffMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('ClinicalStaffMSP.peer')"

  - &DiagnosticStaff
    Name: DiagnosticStaffMSP
    ID: DiagnosticStaffMSP
    MSPDir: ../organizations/peerOrganizations/diagnosticstaff.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('DiagnosticStaffMSP.admin', 'DiagnosticStaffMSP.peer', 'DiagnosticStaffMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('DiagnosticStaffMSP.admin', 'DiagnosticStaffMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('DiagnosticStaffMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('DiagnosticStaffMSP.peer')"

  - &PharmacyServices
    Name: PharmacyServicesMSP
    ID: PharmacyServicesMSP
    MSPDir: ../organizations/peerOrganizations/pharmacy.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('PharmacyServicesMSP.admin', 'PharmacyServicesMSP.peer', 'PharmacyServicesMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('PharmacyServicesMSP.admin', 'PharmacyServicesMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('PharmacyServicesMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('PharmacyServicesMSP.peer')"

  - &InsuranceProvider
    Name: InsuranceProviderMSP
    ID: InsuranceProviderMSP
    MSPDir: ../organizations/peerOrganizations/insurance.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('InsuranceProviderMSP.admin', 'InsuranceProviderMSP.peer', 'InsuranceProviderMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('InsuranceProviderMSP.admin', 'InsuranceProviderMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('InsuranceProviderMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('InsuranceProviderMSP.peer')"

  - &PatientAccess
    Name: PatientAccessMSP
    ID: PatientAccessMSP
    MSPDir: ../organizations/peerOrganizations/patientaccess.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('PatientAccessMSP.admin', 'PatientAccessMSP.peer', 'PatientAccessMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('PatientAccessMSP.admin', 'PatientAccessMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('PatientAccessMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('PatientAccessMSP.peer')"

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  Addresses:
    - orderer.example.com:7050
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  ChannelUsingRaft:
    <<: *ChannelDefaults
    Orderer: &ChannelOrderer
      <<: *OrdererDefaults
      OrdererType: etcdraft
      EtcdRaft:
        Consenters:
          - Host: orderer.example.com
            Port: 7050
            ClientTLSCert: ../organizations/ordererOrganizations/example.com/orderers/orderer.example.com/tls/server.crt
            ServerTLSCert: ../organizations/ordererOrganizations/example.com/orderers/orderer.example.com/tls/server.crt
      Organizations:
        - *OrdererOrg
      Capabilities: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HospitalAdmin
        - *ClinicalStaff
        - *DiagnosticStaff
        - *PharmacyServices
        - *InsuranceProvider
        - *PatientAccess
      Capabilities: *ApplicationCapabilities

  PatientChannel:
    <<: *ChannelDefaults
    Orderer: *ChannelOrderer
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HospitalAdmin
        - *ClinicalStaff
        - *PatientAccess
      Capabilities: *ApplicationCapabilities

  TreatmentChannel:
    <<: *ChannelDefaults
    Orderer: *ChannelOrderer
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HospitalAdmin
        - *ClinicalStaff
        - *DiagnosticStaff
      Capabilities: *ApplicationCapabilities

  BillingChannel:
    <<: *ChannelDefaults
    Orderer: *ChannelOrderer
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HospitalAdmin
        - *InsuranceProvider
        - *PatientAccess
      Capabilities: *ApplicationCapabilities

  EmergencyChannel:
    <<: *ChannelDefaults
    Orderer: *ChannelOrderer
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HospitalAdmin
        - *ClinicalStaff
        - *DiagnosticStaff
      Capabilities: *ApplicationCapabilities

  PharmacyChannel:
    <<: *ChannelDefaults
    Orderer: *ChannelOrderer
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HospitalAdmin
        - *ClinicalStaff
        - *PharmacyServices
      Capabilities: *ApplicationCapabilities

  AuditChannel:
    <<: *ChannelDefaults
    Orderer: *ChannelOrderer
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HospitalAdmin
        - *InsuranceProvider
      Capabilities: *ApplicationCapabilities
