networks:
  test:
    name: fabric_test

services:
  # ==========================================================
  # CouchDB - Hospital Admin
  # ==========================================================
  couchdb0:
    container_name: couchdb0
    image: couchdb:3.4.2
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u admin:adminpw http://localhost:5984/_up >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "5984:5984"
    networks:
      - test

  peer0.hospitaladmin.example.com:
    environment:
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    depends_on:
      couchdb0:
        condition: service_healthy

  # ==========================================================
  # CouchDB - Clinical Staff
